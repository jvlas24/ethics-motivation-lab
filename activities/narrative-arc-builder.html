<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constructor de Arco Narrativo · Misión 2</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;1,400;1,700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --forest: #533477; --forest-mid: #6b45a0; --forest-light: #f0eaf8;
  --gold: #6AC7DC; --gold-light: #e8f7fa;
  --ink: #1a1a1a; --ink-mid: #444444; --ink-soft: #7a7979;
  --paper: #fafafa; --white: #fff; --border: rgba(83,52,119,0.12);
}
body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

.activity-header { background: var(--forest); padding: 2rem; }
.mission-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 4px; }
.activity-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.6rem; font-weight: 800; color: white; letter-spacing: -0.03em; margin-bottom: 2px; }
.activity-subtitle { font-size: 13px; color: rgba(255,255,255,0.5); font-style: italic; }

.wizard-progress {
  background: white; border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
}
.step-dots { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.step-dot {
  width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 500; transition: all 0.2s;
  border: 1.5px solid var(--border); background: white; color: var(--ink-soft);
  flex-shrink: 0;
}
.step-dot.done { background: var(--forest); border-color: var(--forest); color: white; }
.step-dot.active { background: var(--gold); border-color: var(--gold); color: #1a1a1a; }
.step-connector { flex: 1; height: 1.5px; background: var(--border); min-width: 8px; max-width: 24px; }
.step-connector.done { background: var(--forest); }
.step-label { font-size: 12px; color: var(--ink-soft); margin-top: 6px; }

.wizard-body { max-width: 680px; margin: 0 auto; padding: 2.5rem 2rem; }

.step-header { margin-bottom: 1.75rem; }
.step-num { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
.step-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--ink); letter-spacing: -0.03em; margin-bottom: 4px; }
.step-desc { font-size: 14px; color: var(--ink-soft); line-height: 1.6; }
.step-hint { background: var(--gold-light); border: 1px solid rgba(200,168,75,0.3); border-radius: 6px; padding: 0.875rem 1rem; margin-bottom: 1.25rem; font-size: 13px; color: #1a6e7e; line-height: 1.6; }
.step-hint strong { color: #1a4a56; }

.form-group { margin-bottom: 1.25rem; }
.form-label { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 6px; display: block; }
.form-label span { font-weight: 400; color: var(--ink-soft); font-style: italic; }
textarea, input[type=text] {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 14px;
  color: var(--ink); background: white; resize: vertical; transition: border-color 0.2s;
  line-height: 1.55;
}
textarea:focus, input[type=text]:focus { outline: none; border-color: var(--forest); }
textarea { min-height: 80px; }
.char-count { font-size: 11px; color: var(--ink-soft); text-align: right; margin-top: 4px; }

.missions-builder { display: flex; flex-direction: column; gap: 0.75rem; }
.mission-row { display: grid; grid-template-columns: 28px 1fr; gap: 10px; align-items: start; }
.mission-num-badge { width: 28px; height: 28px; border-radius: 50%; background: var(--forest); color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; margin-top: 1px; flex-shrink: 0; }
.add-mission-btn {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  border: 1.5px dashed var(--border); border-radius: 6px; background: white;
  font-size: 13px; color: var(--ink-soft); cursor: pointer; transition: all 0.15s;
}
.add-mission-btn:hover { border-color: var(--forest); color: var(--forest); }

.nav-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; }
.btn-nav { font-size: 14px; font-weight: 500; padding: 11px 24px; border-radius: 6px; border: 1.5px solid var(--border); background: white; color: var(--ink-mid); cursor: pointer; transition: all 0.15s; }
.btn-nav:hover { border-color: var(--forest); color: var(--forest); }
.btn-nav.primary { background: var(--forest); border-color: var(--forest); color: white; }
.btn-nav.primary:hover { background: var(--forest-mid); }
.btn-nav:disabled { opacity: 0.4; cursor: default; }

/* SUMMARY */
.summary-card {
  background: white; border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden;
}
.summary-header { background: var(--forest); padding: 1.75rem 2rem; }
.summary-header h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.3rem; font-weight: 800; color: white; margin-bottom: 4px; }
.summary-header .title-out { font-size: 1rem; color: var(--gold); font-weight: 500; }
.summary-body { padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1.25rem; }
.summary-section { border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
.summary-section-header { background: var(--forest-light); padding: 0.75rem 1rem; font-size: 12px; font-weight: 500; color: var(--forest); letter-spacing: 0.08em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
.summary-section-body { padding: 1rem; }
.summary-field { margin-bottom: 0.875rem; }
.summary-field:last-child { margin-bottom: 0; }
.summary-field-label { font-size: 11px; color: var(--ink-soft); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.08em; }
.summary-field-value { font-size: 14px; color: var(--ink); line-height: 1.6; }
.summary-missions { display: flex; flex-direction: column; gap: 8px; }
.summary-mission { display: grid; grid-template-columns: 28px 1fr; gap: 10px; align-items: start; }
.summary-mission-badge { width: 28px; height: 28px; border-radius: 50%; background: var(--forest); color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
.summary-mission-text { font-size: 14px; color: var(--ink); line-height: 1.55; }

.summary-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
.btn-download-sum { font-size: 13px; font-weight: 500; padding: 10px 18px; border-radius: 6px; background: var(--forest); border: none; color: white; cursor: pointer; }
.btn-print { font-size: 13px; font-weight: 500; padding: 10px 18px; border-radius: 6px; border: 1.5px solid var(--border); background: white; color: var(--ink-mid); cursor: pointer; }
.btn-restart { font-size: 13px; color: var(--ink-soft); background: none; border: none; cursor: pointer; padding: 10px 4px; }

.download-bar { background: var(--ink); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
.download-bar p { font-size: 13px; color: rgba(255,255,255,0.55); }
.btn-dl { font-size: 13px; font-weight: 500; padding: 8px 18px; border-radius: 6px; background: var(--gold); border: none; color: #1a1a1a; cursor: pointer; }
.btn-dl:hover { opacity: 0.85; }

@media (max-width: 600px) {
  .wizard-body { padding: 1.5rem 1rem; }
  .step-dot { width: 24px; height: 24px; font-size: 10px; }
}
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-logo" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;color:var(--forest);text-decoration:none;">Ethics Motivation <span style="color:var(--ink-soft);font-weight:400;">Lab</span></a>
  <a href="./index.html" style="font-size:13px;color:var(--ink-mid);text-decoration:none;">← Activity library</a>
</nav>
<div class="activity-header">
  <div class="mission-tag">Misión 2 · Actividad 2 · La Forja del Héroe</div>
  <div class="activity-title">✏️ Constructor de Arco Narrativo</div>
  <div class="activity-subtitle">Narrative Arc Builder · Hero's Journey Framework</div>
</div>

<div class="wizard-progress">
  <div class="step-dots" id="step-dots"></div>
  <div class="step-label" id="step-label"></div>
</div>

<div class="wizard-body" id="wizard-body"></div>

<div class="download-bar">
  <p>Ethics Motivation Lab · EPG UPC · Jessica Vlasica · Misión 2</p>
  <button class="btn-dl" onclick="downloadHTML()">⬇ Descargar HTML para Blackboard</button>
</div>

<script>
const STEPS = [
  {
    icon: '🧙', num: 'Paso 1 de 9', title: 'Bienvenido/a al Constructor',
    desc: 'Vas a diseñar el arco narrativo completo de tu experiencia gamificada usando el Viaje del Héroe como estructura. Este será el documento base para tu TA1 (20% de la nota).',
    hint: '<strong>¿Qué vas a crear?</strong> Un canvas narrativo completo basado en el Viaje del Héroe, aplicado a tu contexto educativo. Tiempo recomendado: 40 minutos.',
    type: 'intro',
  },
  {
    icon: '🦸', num: 'Paso 2 de 9', title: 'El Héroe',
    desc: 'Define quién es tu estudiante/usuario. Esta es la persona que vivirá tu experiencia gamificada.',
    hint: '💡 <strong>Pregunta clave:</strong> ¿Quién vivirá esta experiencia? Sé específico/a sobre su perfil, conocimientos previos y motivaciones. Piensa en un contexto educativo real (tu curso, un taller, una capacitación).',
    type: 'fields',
    fields: [
      { key: 'hero_who', label: '¿Quién es tu héroe/heroína?', placeholder: 'Ej: Estudiantes de pregrado, primer ciclo, curso de Introducción a la Investigación', hint:'Perfil del estudiante/usuario', maxlen: 200 },
      { key: 'hero_knows', label: '¿Qué sabe o puede hacer actualmente?', placeholder: 'Ej: Reconoce los conceptos básicos de investigación pero no ha diseñado un proyecto propio', hint:'Conocimientos y habilidades de partida', maxlen: 400, tall: true },
      { key: 'hero_struggles', label: '¿Qué frustraciones, miedos o barreras enfrenta?', placeholder: 'Ej: Se siente abrumado por la metodología, tiene miedo a equivocarse, no ve la relevancia práctica', hint:'Pain points y obstáculos', maxlen: 400, tall: true },
    ]
  },
  {
    icon: '🌍', num: 'Paso 3 de 9', title: 'El Mundo',
    desc: 'Define el contexto y la situación inicial de tu experiencia gamificada.',
    hint: '💡 <strong>El mundo ordinario:</strong> ¿Cómo es el contexto de aprendizaje antes de que empiece la experiencia? ¿Qué está funcionando y qué no?',
    type: 'fields',
    fields: [
      { key: 'world_context', label: 'Contexto educativo o corporativo', placeholder: 'Ej: Curso virtual de 6 sesiones, modalidad asíncrona, estudiantes de posgrado con experiencia laboral...', maxlen: 300, tall: true },
      { key: 'world_current', label: 'Situación actual (sin gamificación)', placeholder: 'Ej: Clases expositivas, baja participación en foros, evaluación solo con examen final...', maxlen: 300, tall: true },
    ]
  },
  {
    icon: '⚔️', num: 'Paso 4 de 9', title: 'El Conflicto y la Transformación',
    desc: 'Define el desafío central y la transformación prometida al héroe.',
    hint: '💡 <strong>El conflicto:</strong> Sin un desafío real y significativo, la gamificación se convierte en entretenimiento vacío. El conflicto debe conectar con las frustraciones reales del héroe.',
    type: 'fields',
    fields: [
      { key: 'conflict', label: 'Conflicto o desafío central', placeholder: 'Ej: Los estudiantes no conectan la teoría con su práctica profesional y abandonan los cursos a mitad de camino', maxlen: 300, tall: true },
      { key: 'transformation', label: 'Transformación prometida (antes → después)', placeholder: 'Ej: De espectadores pasivos a diseñadores activos de experiencias de aprendizaje', maxlen: 300 },
      { key: 'value_prop', label: 'Propuesta de valor para el héroe', placeholder: 'Ej: Al terminar tendrás un proyecto real, habilidades aplicables esta semana y una red de pares', maxlen: 300 },
    ]
  },
  {
    icon: '🗺️', num: 'Paso 5 de 9', title: 'Estructura de Misiones',
    desc: 'Define las 3 a 5 misiones que articulan el viaje del héroe. Cada misión debe tener un nombre narrativo y un propósito de aprendizaje claro.',
    hint: '💡 <strong>Nombres narrativos:</strong> En vez de "Módulo 1", usa nombres que evoquen el viaje: "El Despertar", "La Prueba", "La Forja", "El Regreso". El nombre debe conectar con el contenido y con el arco emocional.',
    type: 'missions',
  },
  {
    icon: '⚡', num: 'Paso 6 de 9', title: 'Mecánicas Clave',
    desc: 'Elige y justifica las mecánicas de juego principales de tu experiencia.',
    hint: '💡 <strong>Selecciona con propósito:</strong> Cada mecánica debe responder a una necesidad pedagógica real, no a una moda. Pregúntate: ¿esta mecánica apoya la motivación intrínseca o crea dependencia externa?',
    type: 'fields',
    fields: [
      { key: 'mechanic_1', label: 'Mecánica principal y su justificación', placeholder: 'Ej: Sistema XP con 5 niveles de competencia — porque transforma la evaluación de punitiva a acumulativa, alineado con SDT', maxlen: 300, tall: true },
      { key: 'mechanic_2', label: 'Mecánica de progresión', placeholder: 'Ej: Barra de progreso por misión — visualiza el avance y reduce la ansiedad ante la evaluación', maxlen: 250 },
      { key: 'mechanic_3', label: 'Mecánica de feedback o social (opcional)', placeholder: 'Ej: Peer review con rúbrica — convierte la evaluación entre pares en oportunidad de aprendizaje colaborativo', maxlen: 250 },
    ]
  },
  {
    icon: '⚖️', num: 'Paso 7 de 9', title: 'Análisis Ético',
    desc: 'Examina críticamente tu diseño desde una perspectiva ética.',
    hint: '💡 <strong>Pregunta clave:</strong> ¿Tu diseño respeta la autonomía del aprendiz? ¿Podría crear presión negativa, ansiedad o exclusión? La gamificación ética hace explícita su lógica y co-crea reglas con los estudiantes.',
    type: 'fields',
    fields: [
      { key: 'ethics_risks', label: 'Posibles riesgos éticos de tu diseño', placeholder: 'Ej: El leaderboard podría desmotivar a quienes van rezagados; el sistema de vidas podría crear ansiedad...', maxlen: 350, tall: true },
      { key: 'ethics_safeguards', label: 'Salvaguardas éticas que incorporarás', placeholder: 'Ej: Leaderboard de progreso propio (no comparativo), sin penalizaciones, lineamientos de IA co-creados con estudiantes...', maxlen: 350, tall: true },
    ]
  },
  {
    icon: '📊', num: 'Paso 8 de 9', title: 'Impacto Esperado',
    desc: 'Define los indicadores con los que medirás el éxito de tu experiencia gamificada.',
    hint: '💡 <strong>Indicadores medibles:</strong> ¿Cómo sabrás que tu gamificación funcionó? Define indicadores de motivación, participación y aprendizaje que puedas recolectar en tu contexto real.',
    type: 'fields',
    fields: [
      { key: 'impact_motivation', label: 'Indicador de motivación', placeholder: 'Ej: % de estudiantes que completan actividades opcionales (voluntarias)', maxlen: 250 },
      { key: 'impact_participation', label: 'Indicador de participación', placeholder: 'Ej: Calidad de contribuciones en foros (rúbrica de 3 niveles) vs. semestre anterior', maxlen: 250 },
      { key: 'impact_learning', label: 'Indicador de aprendizaje', placeholder: 'Ej: % que alcanza nivel 4 (AI Mentor) en el sistema XP al finalizar el curso', maxlen: 250 },
    ]
  },
  {
    icon: '🏁', num: 'Paso 9 de 9', title: 'Título de tu Experiencia',
    desc: 'Dale un nombre a tu experiencia gamificada. El título debe capturar la esencia del viaje que propones.',
    hint: '💡 <strong>Un buen título</strong> evoca el propósito, genera expectativa y puede ser recordado por los estudiantes. Evita títulos genéricos como "Curso Gamificado".',
    type: 'fields',
    fields: [
      { key: 'exp_title', label: 'Título de la experiencia gamificada', placeholder: 'Ej: El Laboratorio de la Motivación Ética / La Forja del Investigador / The Learning Quest', maxlen: 100 },
      { key: 'exp_tagline', label: 'Tagline (subtítulo)', placeholder: 'Ej: Un viaje de seis misiones hacia el diseño de aprendizajes que transforman', maxlen: 180 },
    ]
  },
];

let currentStep = 0;
const data = {};
let missionCount = 3;

function renderDots() {
  const total = STEPS.length;
  let html = '';
  STEPS.forEach((s, i) => {
    if (i > 0) html += `<div class="step-connector ${i <= currentStep ? 'done' : ''}"></div>`;
    const cls = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
    html += `<div class="step-dot ${cls}">${i < currentStep ? '✓' : i + 1}</div>`;
  });
  document.getElementById('step-dots').innerHTML = html;
  document.getElementById('step-label').textContent = STEPS[currentStep].num + ' — ' + STEPS[currentStep].title;
}

function renderStep() {
  const s = STEPS[currentStep];
  const isLast = currentStep === STEPS.length - 1;
  const isFirst = currentStep === 0;

  let bodyHTML = '';

  if (s.type === 'intro') {
    bodyHTML = `<div class="step-header">
      <div class="step-num">${s.num}</div>
      <div class="step-title">${s.icon} ${s.title}</div>
      <div class="step-desc">${s.desc}</div>
    </div>
    <div class="step-hint">${s.hint}</div>
    <div style="background:var(--forest-light);border-radius:6px;padding:1.25rem;font-size:14px;color:var(--forest);line-height:1.7;">
      <strong>Lo que vas a diseñar en 9 pasos:</strong><br>
      El Héroe → El Mundo → El Conflicto → Las Misiones → Las Mecánicas → El Análisis Ético → El Impacto → El Título<br>
      <span style="font-size:12px;color:var(--forest-mid);font-style:italic;">Al finalizar, podrás descargar tu arco narrativo completo como documento.</span>
    </div>`;
  } else if (s.type === 'fields') {
    const fields = s.fields.map(f => {
      const val = data[f.key] || '';
      const count = val.length;
      if (f.tall) {
        return `<div class="form-group">
          <label class="form-label">${f.label} ${f.hint ? `<span>· ${f.hint}</span>` : ''}</label>
          <textarea id="field-${f.key}" maxlength="${f.maxlen || 400}" onkeyup="saveField('${f.key}', this.value)"
            placeholder="${f.placeholder}">${val}</textarea>
          <div class="char-count" id="cc-${f.key}">${count} / ${f.maxlen || 400}</div>
        </div>`;
      }
      return `<div class="form-group">
        <label class="form-label">${f.label} ${f.hint ? `<span>· ${f.hint}</span>` : ''}</label>
        <input type="text" id="field-${f.key}" maxlength="${f.maxlen || 200}" value="${val}"
          placeholder="${f.placeholder}" oninput="saveField('${f.key}', this.value)">
        <div class="char-count" id="cc-${f.key}">${count} / ${f.maxlen || 200}</div>
      </div>`;
    }).join('');

    bodyHTML = `<div class="step-header">
      <div class="step-num">${s.num}</div>
      <div class="step-title">${s.icon} ${s.title}</div>
      <div class="step-desc">${s.desc}</div>
    </div>
    <div class="step-hint">${s.hint}</div>
    ${fields}`;
  } else if (s.type === 'missions') {
    let missionRows = '';
    for (let i = 1; i <= missionCount; i++) {
      const key = `mission_${i}`;
      const val = data[key] || '';
      missionRows += `<div class="mission-row">
        <div class="mission-num-badge">${i}</div>
        <textarea id="field-${key}" placeholder="Nombre narrativo + propósito de aprendizaje de la Misión ${i}. Ej: La Chispa — Estudiantes descubren el poder del diseño narrativo y definen su hero persona." maxlength="300" onkeyup="saveField('${key}', this.value)">${val}</textarea>
      </div>`;
    }
    bodyHTML = `<div class="step-header">
      <div class="step-num">${s.num}</div>
      <div class="step-title">${s.icon} ${s.title}</div>
      <div class="step-desc">${s.desc}</div>
    </div>
    <div class="step-hint">${s.hint}</div>
    <div class="missions-builder" id="missions-builder">${missionRows}</div>
    ${missionCount < 5 ? `<button class="add-mission-btn" style="margin-top:0.75rem;" onclick="addMission()">+ Añadir misión</button>` : ''}`;
  } else if (s.type === 'summary') {
    bodyHTML = renderSummary();
  }

  if (s.type !== 'summary') {
    bodyHTML += `<div class="nav-controls">
      <button class="btn-nav" onclick="prevStep()" ${isFirst ? 'disabled' : ''}>← Anterior</button>
      <button class="btn-nav primary" onclick="nextStep()">${isLast ? 'Ver mi arco narrativo →' : 'Siguiente →'}</button>
    </div>`;
  }

  document.getElementById('wizard-body').innerHTML = bodyHTML;
  renderDots();
}

function saveField(key, val) {
  data[key] = val;
  const cc = document.getElementById(`cc-${key}`);
  const maxlenMap = {};
  STEPS.forEach(s => { if (s.fields) s.fields.forEach(f => { maxlenMap[f.key] = f.maxlen || 400; }); });
  if (cc) cc.textContent = `${val.length} / ${maxlenMap[key] || 400}`;
}

function addMission() {
  if (missionCount < 5) {
    missionCount++;
    renderStep();
  }
}

function prevStep() { if (currentStep > 0) { currentStep--; renderStep(); window.scrollTo(0,0); } }

function nextStep() {
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep();
    window.scrollTo(0, 0);
  } else {
    showSummary();
  }
}

function showSummary() {
  document.getElementById('wizard-body').innerHTML = renderSummaryHTML();
  document.getElementById('step-dots').parentElement.style.display = 'none';
}

function renderSummaryHTML() {
  const title = data['exp_title'] || 'Mi Experiencia Gamificada';
  const tagline = data['exp_tagline'] || '';

  const missions = [];
  for (let i = 1; i <= missionCount; i++) {
    if (data[`mission_${i}`]) missions.push(data[`mission_${i}`]);
  }

  return `<div class="summary-card">
    <div class="summary-header">
      <div style="font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:8px;">Arco Narrativo Gamificado · TA1</div>
      <h2>${title}</h2>
      ${tagline ? `<div class="title-out">${tagline}</div>` : ''}
    </div>
    <div class="summary-body">

      <div class="summary-section">
        <div class="summary-section-header">🦸 El Héroe</div>
        <div class="summary-section-body">
          ${field('Perfil del héroe/heroína', data['hero_who'])}
          ${field('Conocimientos de partida', data['hero_knows'])}
          ${field('Frustraciones y barreras', data['hero_struggles'])}
        </div>
      </div>

      <div class="summary-section">
        <div class="summary-section-header">🌍 El Mundo y el Conflicto</div>
        <div class="summary-section-body">
          ${field('Contexto', data['world_context'])}
          ${field('Situación actual', data['world_current'])}
          ${field('Conflicto central', data['conflict'])}
          ${field('Transformación prometida', data['transformation'])}
          ${field('Propuesta de valor', data['value_prop'])}
        </div>
      </div>

      <div class="summary-section">
        <div class="summary-section-header">🗺️ Estructura de Misiones</div>
        <div class="summary-section-body">
          <div class="summary-missions">
            ${missions.map((m,i) => `<div class="summary-mission"><div class="summary-mission-badge">${i+1}</div><div class="summary-mission-text">${m}</div></div>`).join('')}
          </div>
        </div>
      </div>

      <div class="summary-section">
        <div class="summary-section-header">⚡ Mecánicas Clave</div>
        <div class="summary-section-body">
          ${field('Mecánica principal', data['mechanic_1'])}
          ${field('Mecánica de progresión', data['mechanic_2'])}
          ${data['mechanic_3'] ? field('Mecánica de feedback/social', data['mechanic_3']) : ''}
        </div>
      </div>

      <div class="summary-section">
        <div class="summary-section-header">⚖️ Análisis Ético</div>
        <div class="summary-section-body">
          ${field('Riesgos éticos identificados', data['ethics_risks'])}
          ${field('Salvaguardas éticas', data['ethics_safeguards'])}
        </div>
      </div>

      <div class="summary-section">
        <div class="summary-section-header">📊 Impacto Esperado</div>
        <div class="summary-section-body">
          ${field('Indicador de motivación', data['impact_motivation'])}
          ${field('Indicador de participación', data['impact_participation'])}
          ${field('Indicador de aprendizaje', data['impact_learning'])}
        </div>
      </div>

      <div class="summary-actions">
        <button class="btn-download-sum" onclick="downloadSummary()">⬇ Descargar como HTML</button>
        <button class="btn-print" onclick="window.print()">🖨 Imprimir / PDF</button>
        <button class="btn-restart" onclick="restartWizard()">↺ Editar desde el inicio</button>
      </div>
    </div>
  </div>`;
}

function field(label, value) {
  if (!value) return '';
  return `<div class="summary-field">
    <div class="summary-field-label">${label}</div>
    <div class="summary-field-value">${value}</div>
  </div>`;
}

function restartWizard() {
